<?xml version="1.0" encoding="UTF-8"?>
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Door frame -->
  <rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="2" fill="none" />

  <!-- Door -->
  <rect x="6" y="6" width="8" height="12" rx="1" stroke="currentColor" stroke-width="1.5"
    fill="none" />

  <!-- Door handle -->
  <circle cx="12" cy="12" r="1" fill="currentColor" />

  <!-- Exit arrow -->
  <path d="M16 8l4 4-4 4M20 12H16" stroke="currentColor" stroke-width="2" stroke-linecap="round"
    stroke-linejoin="round" />

  <!-- Optional: Door opening effect -->
  <path d="M6 6l8 6" stroke="currentColor" stroke-width="1" stroke-linecap="round" opacity="0.6" />
</svg>
