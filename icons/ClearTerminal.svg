<svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
  <!-- Console/Terminal window -->
  <rect x="3" y="4" width="18" height="16" rx="2" fill="none" stroke="currentColor" stroke-width="2" />
  <!-- Terminal prompt lines (faded/cleared) -->
  <line x1="7" y1="9" x2="11" y2="9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
    opacity="0.3" />
  <line x1="7" y1="13" x2="9" y2="13" stroke="currentColor" stroke-width="1.5"
    stroke-linecap="round" opacity="0.3" />
  <!-- Clear/Erase symbol (circle with X) -->
  <circle cx="16" cy="11" r="4.5" fill="none" stroke="currentColor" stroke-width="1.5" />
  <path d="M13.5 8.5l5 5M18.5 8.5l-5 5" stroke="currentColor" stroke-width="1.5"
    stroke-linecap="round" />
</svg>
