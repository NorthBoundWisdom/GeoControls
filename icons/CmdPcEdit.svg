<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
  stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round" role="img"
  aria-label="Edit Point Cloud">
  <title>Edit Point Cloud</title>
  <!-- Point cloud dots -->
  <g id="cloud">
    <circle cx="5.5" cy="7" r="0.9" fill="currentColor" stroke="none" />
    <circle cx="8" cy="5.3" r="0.9" fill="currentColor" stroke="none" />
    <circle cx="10.8" cy="7.6" r="0.9" fill="currentColor" stroke="none" />
    <circle cx="6.7" cy="10.1" r="0.9" fill="currentColor" stroke="none" />
    <circle cx="9.4" cy="9.4" r="0.9" fill="currentColor" stroke="none" />
    <circle cx="12.2" cy="10.6" r="0.9" fill="currentColor" stroke="none" />
    <circle cx="7.6" cy="13" r="0.9" fill="currentColor" stroke="none" />
    <circle cx="10.3" cy="13.5" r="0.9" fill="currentColor" stroke="none" />
    <circle cx="5.8" cy="12.2" r="0.9" fill="currentColor" stroke="none" />
    <circle cx="12.6" cy="8.6" r="0.9" fill="currentColor" stroke="none" />
  </g>
  <!-- Subtle frame hints for 3D context -->
  <g id="frame">
    <path d="M4 6V4h2" />
    <path d="M4 18v2h2" />
  </g>
  <!-- Edit (pencil) overlay -->
  <g id="pencil">
    <!-- Pencil body as a slanted polygon -->
    <path d="M11 17 L17 11 L19 13 L13 19 H11 Z" />
    <!-- Pencil cut line (wood/lead separation) -->
    <path d="M16.2 6.8 L19.1 9.7" />
    <!-- Pencil tip (small filled triangle) -->
    <path d="M11 17 L10.5 19.5 L13 19 Z" fill="currentColor" stroke="none" />
  </g>
</svg>
