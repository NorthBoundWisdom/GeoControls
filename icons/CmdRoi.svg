<?xml version="1.0" encoding="UTF-8"?>
<svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <!-- ROI Box outline -->
    <rect x="3" y="3" width="18" height="18" stroke="currentColor" stroke-width="2" fill="none" stroke-dasharray="4,2"/>

    <!-- Inner selection area -->
    <rect x="6" y="6" width="12" height="12" stroke="currentColor" stroke-width="1.5" fill="none"/>

    <!-- Corner markers -->
    <rect x="5" y="5" width="2" height="2" fill="currentColor"/>
    <rect x="17" y="5" width="2" height="2" fill="currentColor"/>
    <rect x="5" y="17" width="2" height="2" fill="currentColor"/>
    <rect x="17" y="17" width="2" height="2" fill="currentColor"/>

    <!-- Center point -->
    <circle cx="12" cy="12" r="1.5" fill="currentColor"/>
</svg>
